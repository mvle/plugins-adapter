apiVersion: v1
kind: Service
metadata:
  name: plugins-adapter-service
  namespace: istio-system
spec:
  selector:
    app: plugins-adapter
  ports:
    - name: grpc
      protocol: TCP
      port: 50052
      targetPort: 50052
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugins-adapter
  namespace: istio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plugins-adapter
  template:
    metadata:
      labels:
        app: plugins-adapter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: plugins-adapter
          image: plugins-adapter:0.1.0
          # command: ["bash", "-c","--"]
          # args: ["while true; do sleep 3600; done"]
          # imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: PLUGINS_SERVER_HOST
              value: "0.0.0.0"
            - name: LOGLEVEL
              value: "DEBUG"
            - name: PLUGINS_ENABLED
              value: "true"
            # Note: The Dockerfile currently moves resources under ./src/resources
            - name: PLUGIN_CONFIG_FILE
              value: "./src/resources/config/config.yaml"
            - name: PLUGIN_MANAGER_CONFIG
              value: "./src/resources/config/config.yaml"
            - name: PYTHONPATH
              value: "./"
          ports:
            - containerPort: 50052
